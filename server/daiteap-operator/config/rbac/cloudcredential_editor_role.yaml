# permissions for end users to edit cloudcredentials.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: cloudcredential-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: daiteap-operator
    app.kubernetes.io/part-of: daiteap-operator
    app.kubernetes.io/managed-by: kustomize
  name: cloudcredential-editor-role
rules:
- apiGroups:
  - daiteap.com.daiteap.com
  resources:
  - cloudcredentials
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - daiteap.com.daiteap.com
  resources:
  - cloudcredentials/status
  verbs:
  - get
